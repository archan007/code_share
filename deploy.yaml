name: Deploy DEV

# Triggered on merge to the `dev` branch.
# Runs the engine with LIVE Snowflake state read, then applies via Liquibase.

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Apply DDL to Snowflake DEV
    runs-on: ubuntu-latest
    environment: dev
    env:
      TARGET_ENV: DEV
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_DEV_USER }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_DEV_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_DEV_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DEV_DATABASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Snowflake private key to disk
        run: |
          mkdir -p "$RUNNER_TEMP/sf"
          echo "${{ secrets.SNOWFLAKE_DEV_PRIVATE_KEY }}" > "$RUNNER_TEMP/sf/rsa_key.p8"
          chmod 600 "$RUNNER_TEMP/sf/rsa_key.p8"
          echo "SNOWFLAKE_PRIVATE_KEY_PATH=$RUNNER_TEMP/sf/rsa_key.p8" >> "$GITHUB_ENV"

      - name: Generate DDL from live Snowflake state
        run: |
          python -m engine.generate_ddl \
            --env "$TARGET_ENV" \
            --output-root output/ddl \
            | tee engine.log

      - name: Download and install Liquibase
        run: |
          latest_url=$(curl -s https://api.github.com/repos/liquibase/liquibase/releases/latest | grep "browser_download_url.*tar.gz" | cut -d '"' -f 4)
          wget "$latest_url" -O liquibase-latest.tar.gz
          mkdir -p liquibase-install
          tar -xzf liquibase-latest.tar.gz -C liquibase-install
          echo "$PWD/liquibase-install" >> "$GITHUB_PATH"

      - name: Download Snowflake JDBC driver
        run: |
          JDBC_VERSION="3.19.0"
          wget "https://repo1.maven.org/maven2/net/snowflake/snowflake-jdbc/${JDBC_VERSION}/snowflake-jdbc-${JDBC_VERSION}.jar" \
            -O liquibase-install/lib/snowflake-jdbc-${JDBC_VERSION}.jar

      - name: Verify Liquibase installation
        run: liquibase --version

      - name: Liquibase status
        run: |
          liquibase status \
            --changelog-file=liquibase/changelog-master.xml \
            --url="jdbc:snowflake://${{ env.SNOWFLAKE_ACCOUNT }}.snowflakecomputing.com/?db=${{ env.SNOWFLAKE_DATABASE }}&warehouse=${{ env.SNOWFLAKE_WAREHOUSE }}&role=${{ env.SNOWFLAKE_ROLE }}&authenticator=SNOWFLAKE_JWT&private_key_file=${{ env.SNOWFLAKE_PRIVATE_KEY_PATH }}" \
            --username=${{ env.SNOWFLAKE_USER }}

      - name: Liquibase update
        run: |
          liquibase update \
            --changelog-file=liquibase/changelog-master.xml \
            --url="jdbc:snowflake://${{ env.SNOWFLAKE_ACCOUNT }}.snowflakecomputing.com/?db=${{ env.SNOWFLAKE_DATABASE }}&warehouse=${{ env.SNOWFLAKE_WAREHOUSE }}&role=${{ env.SNOWFLAKE_ROLE }}&authenticator=SNOWFLAKE_JWT&private_key_file=${{ env.SNOWFLAKE_PRIVATE_KEY_PATH }}" \
            --username=${{ env.SNOWFLAKE_USER }}

      - name: Post deploy summary
        if: always()
        run: |
          {
            echo "## DEV deploy summary"
            echo ""
            echo "Commit: \`${{ github.sha }}\`"
            echo ""
            echo "### Engine output"
            echo '```'
            grep -E "^\[engine\]" engine.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Shred private key
        if: always()
        run: shred -u "$RUNNER_TEMP/sf/rsa_key.p8" || rm -f "$RUNNER_TEMP/sf/rsa_key.p8"
